name: synapse
description: Knowledge Intelligence Platform — Flutter client.

version: 1.0.0+1

environment:
  sdk: ">=3.0.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  animate_do: ^3.1.2
  google_fonts: ^8.0.2
  intl: ^0.19.0
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  hive: ^2.2.3
  path_provider: ^2.1.5
  hive_flutter: ^1.1.0
  uuid: ^4.5.3

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.4.0
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/profile.jpg
    - assets/images/app.png