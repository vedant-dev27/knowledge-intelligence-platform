name: rag_chat
description: RAG Chat UI with Hive persistence and Gemini

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  hive: ^2.2.3
  hive_flutter: ^1.1.0


  google_generative_ai: ^0.4.3


  path_provider: ^2.1.2


  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
